# Base configuration for nominal vs robust comparison experiment.
# These values are shared across all jobs; sweep.toml overrides [parameters].

name = "nominal_vs_robust"

[data]
station_file       = "Data/zhuzhou_data/station.csv"
order_file         = "Data/zhuzhou_data/order.csv"
segment_file       = "Data/zhuzhou_data/segment.csv"
vehicle_file       = "Data/zhuzhou_data/vehicle.csv"
# Precomputed demand bounds — generated by scripts/generate_demand_bounds.jl
demand_bounds_file = "Data/demand_bounds.json"

[model]
# Overridden per job via sweep.toml; one of: NominalModel | RobustTotalDemandCapModel
type = "NominalModel"

[parameters]
# Scenario definition: 4 time-of-day periods derived from the four_period profile
scenario_profile = "four_period"
start_date       = "2025-05-01"
end_date         = "2025-05-31"

l = 50
# k, in_vehicle_time_weight, and max_walking_distance are swept via sweep.toml

[simulation]
# Set enabled = false to skip simulation and only collect analytical metrics
# (in-sample objective + direct backtest cost from order transformation).
enabled = false
base_date = 2025-05-01
optimization_interval = 300.0
max_wait_time = 900.0
max_time = 86400.0
assignment_mode = "batch"
run_until_complete = true
verbose = false
batch_write_logs = false
batch_write_size = 1000

[solver]
silent             = true
time_limit_seconds = 3600
