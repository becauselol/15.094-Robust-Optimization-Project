# Base configuration for gamma sweep experiment.
# These values are shared across all jobs; sweep.toml overrides [parameters].

name = "gamma_sweep"

[data]
station_file        = "Data/station.csv"
order_file          = "Data/order.csv"
segment_file        = "Data/segment.csv"
# CSV with columns: origin, destination, scenario_type, q_low, q_high
demand_bounds_file  = "Data/demand_bounds.csv"
# Held-out demand samples for out-of-sample evaluation
test_demand_file    = "Data/test_demand_samples.csv"

[model]
# Overridden per job via sweep.toml
type = "NominalModel"

[parameters]
start_date       = "2025-05-12"
end_date         = "2025-05-18"
time_window_hours = 4
weekly_cycle     = false
k                = 8     # active stations per scenario
l                = 12    # total stations to build
lambda           = 1.0   # in-vehicle travel time weight
# gamma is swept; leave unset here so sweep.toml controls it

[solver]
silent = true
time_limit_seconds = 3600
